<!DOCTYPE html>
<html>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user || user.role !== "teacher"){
  location.href = "login.html";
}
</script>

<h2>Teacher Dashboard</h2>
<p>Welcome, <b id="name"></b></p>

<div>
  <h3>Academics</h3>
  <button onclick="go('teacher-submit-grades.html')">Submit Grades</button>
  <button onclick="go('teacher-notes.html')">Send Notes</button>
</div>

<div>
  <h3>Assignments</h3>
  <button onclick="go('teacher-create-assignment.html')">Create</button>
  <button onclick="go('teacher-mark-assignment.html')">Mark</button>
</div>

<div>
  <h3>Quizzes</h3>
  <button onclick="go('teacher-create-quiz.html')">Create Quiz</button>
  <button onclick="go('teacher-quiz-review.html')">View Results</button>
</div>

<br>
<button onclick="logout()">Logout</button>

<script>
document.getElementById("name").innerText = user.name;

function go(p){ location.href = p; }

function logout(){
  localStorage.removeItem("user");
  location.href = "login.html";
}
</script>

</body>
</html>
