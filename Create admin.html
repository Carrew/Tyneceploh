<!DOCTYPE html>
<html>
<body>

<h2>Add New Admin</h2>

<input id="name" placeholder="Full Name">
<input id="pin" placeholder="PIN (optional)">

<button onclick="create()">Create Admin</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const currentUser = JSON.parse(localStorage.getItem("user"));

if(!currentUser || currentUser.role !== "admin"){
  alert("Unauthorized");
  location.href = "login.html";
}

function genID(num){
  return "ADM" + String(num).padStart(3,"0");
}

function genPIN(){
  return Math.floor(1000 + Math.random()*9000).toString();
}

window.create = async function(){

  const snap = await getDocs(collection(db,"users"));

  let count = 0;

  snap.forEach(d=>{
    if(d.data().role === "admin") count++;
  });

  const id = genID(count+1);
  const pin = document.getElementById("pin").value || genPIN();

  await addDoc(collection(db,"users"),{
    userId:id,
    name:document.getElementById("name").value,
    pin,
    role:"admin",
    status:"active",
    createdAt:Date.now()
  });

  alert("Admin created\nID: "+id+"\nPIN: "+pin);
};

</script>

</body>
</html>
