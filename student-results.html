<!DOCTYPE html>
<html>
<head>
  <title>My Results - TEF</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f7f6; }
    h2 { color: #2c3e50; }
    #table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
    th { background-color: #007bff; color: white; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .avg-cell { font-weight: bold; background-color: #e9ecef; }
    button { margin-top: 20px; padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #c82333; }
  </style>
</head>

<body>

<h2>Academic Performance Report</h2>

<div id="table-container">
    <div id="table">Loading your results...</div>
</div>

<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));

// FIX: Removed the "active" status check to honor your rule that student status 
// (New/Old) does not affect their ability to use the system.
if (!user || user.role !== "student") {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

const periods = [
  "1st Period","2nd Period","3rd Period","Semester Exam",
  "4th Period","5th Period","6th Period","Final Exam"
];

async function loadResults() {
  try {
    const snap = await getDocs(collection(db, "results"));
    const myResults = [];

    const currentUserId = user.userId?.toString().trim().toLowerCase();

    snap.forEach(d => {
      const data = d.data();
      const resultStudentId = data.studentId?.toString().trim().toLowerCase();

      if (resultStudentId === currentUserId) {
        myResults.push(data);
      }
    });

    buildTable(myResults);
  } catch (error) {
    console.error("Firebase Error:", error);
    document.getElementById("table").innerHTML = "Error loading data.";
  }
}

function buildTable(results) {
  if (results.length === 0) {
    document.getElementById("table").innerHTML = "<p>No results have been uploaded for your ID yet.</p>";
    return;
  }

  const subjects = {};

  // Organize data: { "Math": { "1st Period": 85, "2nd Period": 90 } }
  results.forEach(r => {
    if (!subjects[r.subject]) {
      subjects[r.subject] = {};
    }
    subjects[r.subject][r.period] = r.score;
  });

  let html = `
    <table>
      <thead>
        <tr>
          <th>Subject</th>
          ${periods.map(p => `<th>${p}</th>`).join("")}
          <th>Cumulative Avg</th>
        </tr>
      </thead>
      <tbody>
  `;

  Object.keys(subjects).sort().forEach(subject => {
    let total = 0;
    let count = 0;

    html += `<tr><td><b>${subject}</b></td>`;

    periods.forEach(p => {
      const score = subjects[subject][p] ?? "-";
      html += `<td>${score}</td>`;

      if (score !== "-") {
        total += Number(score);
        count++;
      }
    });

    const avg = count ? (total / count).toFixed(1) : "-";
    html += `<td class="avg-cell">${avg}</td></tr>`;
  });

  html += "</tbody></table>";
  document.getElementById("table").innerHTML = html;
}

window.logout = function () {
  localStorage.removeItem("user");
  window.location.href = "login.html";
};

loadResults();
</script>

</body>
</html>
