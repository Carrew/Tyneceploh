<!DOCTYPE html>
<html>
<head>
  <title>Create Assignment</title>
</head>

<body>

<h2>Create Assignment</h2>

<select id="class"></select>

<input id="subject" placeholder="Subject">

<textarea id="question" placeholder="Assignment Question"></textarea>

<input id="dueDate" type="date">

<br><br>

<button onclick="createAssignment()">Create</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "teacher") {
  window.location.href = "login.html";
}

// load classes
document.getElementById("class").innerHTML =
  (user.classes || []).map(c =>
    `<option value="${c}">${c}</option>`
  ).join("");

window.createAssignment = async function () {

  const className = document.getElementById("class").value;
  const subject = document.getElementById("subject").value;
  const question = document.getElementById("question").value;
  const dueDate = document.getElementById("dueDate").value;

  if (!className || !subject || !question) {
    alert("Fill required fields");
    return;
  }

  await addDoc(collection(db, "assignments"), {
    teacherId: user.id,
    teacherName: user.name,
    class: className,
    subject,
    question,
    dueDate,
    createdAt: Date.now()
  });

  document.getElementById("msg").innerText = "Assignment created";

  document.getElementById("subject").value = "";
  document.getElementById("question").value = "";
};

</script>

</body>
</html>
