<!DOCTYPE html>
<html>
<body>

<h2>Create Quiz (Weighted MCQ)</h2>

<select id="class"></select>
<input id="title" placeholder="Quiz Title">

<div id="questions"></div>

<button onclick="addQ()">+ Add Question</button>
<br><br>

<button onclick="createQuiz()">Create Quiz</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if(!user || user.role !== "teacher") location.href="login.html";

document.getElementById("class").innerHTML =
  (user.classes || []).map(c=>`<option>${c}</option>`).join("");

let count = 0;

window.addQ = function(){

  count++;

  document.getElementById("questions").innerHTML += `
    <div style="margin:10px 0;">
      <b>Q${count}</b><br>

      <input id="q${count}" placeholder="Question"><br>

      A <input id="a${count}">
      B <input id="b${count}">
      C <input id="c${count}">
      D <input id="d${count}"><br>

      Correct:
      <select id="ans${count}">
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>

      Score:
      <input id="s${count}" type="number" style="width:60px" value="1">
    </div>
  `;
};

window.createQuiz = async function(){

  const questions = [];
  let total = 0;

  for(let i=1;i<=count;i++){

    const q = document.getElementById(`q${i}`).value;
    const a = document.getElementById(`a${i}`).value;
    const b = document.getElementById(`b${i}`).value;
    const c = document.getElementById(`c${i}`).value;
    const d = document.getElementById(`d${i}`).value;

    const ans = document.getElementById(`ans${i}`).value;
    const score = Number(document.getElementById(`s${i}`).value || 0);

    if(!q || !a || !b || !c || !d) continue;

    questions.push({
      q,
      options:[a,b,c,d],
      answer:ans,
      score
    });

    total += score;
  }

  await addDoc(collection(db,"quizzes"),{
    teacherId:user.id,
    class:document.getElementById("class").value,
    title:document.getElementById("title").value,
    questions,
    totalScore: total,
    createdAt:Date.now()
  });

  alert("Quiz created with total score: " + total);
};

</script>

</body>
</html>
