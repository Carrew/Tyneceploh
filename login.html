<!DOCTYPE html>
<html>
<head>
  <title>TEF Login</title>
</head>

<body>

<h2>Login</h2>

<input id="userId" placeholder="ID">
<input id="pin" type="password" placeholder="PIN">

<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

window.login = async function () {

  const id = document.getElementById("userId").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msg");

  const snapshot = await getDocs(collection(db, "users"));

  let user = null;

  snapshot.forEach(doc => {
    const data = doc.data();
    if (data.id === id) user = data;
  });

  if (!user) {
    msg.innerText = "Invalid ID";
    return;
  }

  const hashed = await sha256(pin);

  if (hashed !== user.pinHash) {
    msg.innerText = "Wrong PIN";
    return;
  }

  localStorage.setItem("user", JSON.stringify(user));

  msg.innerText = "Login success...";

  setTimeout(() => {

    if (user.role === "student") {
      window.location.href = "student-dashboard.html";
    }

    else if (user.role === "teacher") {
      window.location.href = "teacher-dashboard.html";
    }

    else if (user.role === "admin") {
      window.location.href = "admin-dashboard.html";
    }

    else {
      window.location.href = "dashboard.html";
    }

  }, 800);

};

</script>

</body>
</html>
