<!DOCTYPE html>
<html>
<head>
  <title>Login - TEF System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>Login</h2>

<input id="id" placeholder="User ID">
<input id="pin" type="password" placeholder="PIN">

<button onclick="login()">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh"
});

const db = getFirestore(app);

window.login = async function(){

  const idInput = document.getElementById("id").value.trim().toUpperCase();
  const pinInput = document.getElementById("pin").value.trim();

  if(!idInput || !pinInput){
    alert("Enter ID and PIN");
    return;
  }

  // Note: For large databases, use a Firestore query instead of fetching all docs
  const snap = await getDocs(collection(db, "users"));

  let found = null;

  snap.forEach(d => {
    const u = d.data();

    // Check matching ID and PIN (Plaintext)
    if(u.userId === idInput && u.pin === pinInput){
      found = {
        id: u.userId,         // Mapping userId to 'id' for use in other pages
        userId: u.userId,
        name: u.name || "",
        role: (u.role || "").toLowerCase(),
        class: u.class || "",
        classes: u.classes || [],
        status: u.status || ""
      };
    }
  });

  if(!found){
    alert("Invalid ID or PIN");
    return;
  }

  // --- 🚀 STATUS LOGIC UPDATE ---
  // If the user is NOT a student, they MUST be "active" to log in.
  // If the user IS a student, we ignore the status (New/Old) and let them in.
  if(found.role !== "student" && found.status !== "active"){
    alert("Account restricted. Please contact administration.");
    return;
  }

  // Save the user object to localStorage for session management
  localStorage.setItem("user", JSON.stringify(found));

  console.log("✅ Logged in successfully as:", found.role);

  // --- 🚀 ROLE ROUTING ---
  switch(found.role){
    case "admin":
      location.href = "admin-dashboard.html";
      break;

    case "teacher":
      location.href = "teacher-dashboard.html";
      break;

    case "student":
      location.href = "student-dashboard.html";
      break;

    case "janitor":
      location.href = "janitor-dashboard.html";
      break;

    case "security":
      location.href = "security-dashboard.html";
      break;

    case "coordinator":
      location.href = "coordinator-dashboard.html";
      break;

    default:
      alert("Role not recognized. Redirecting to home.");
      location.href = "index.html";
  }
};

</script>

</body>
</html>
