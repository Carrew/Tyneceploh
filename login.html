<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input id="id" placeholder="User ID">
<input id="pin" type="password" placeholder="PIN">

<button onclick="login()">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh"
});

const db = getFirestore(app);

window.login = async function(){

  const id = document.getElementById("id").value.trim().toUpperCase();
  const pin = document.getElementById("pin").value.trim();

  if(!id || !pin){
    alert("Enter ID and PIN");
    return;
  }

  const snap = await getDocs(collection(db,"users"));

  let found = null;

  snap.forEach(d=>{
    const u = d.data();

    if(u.userId === id && u.pin === pin){
      found = {
        userId: u.userId,
        name: u.name || "",
        role: (u.role || "").toLowerCase(),
        class: u.class || "",
        classes: u.classes || [],
        status: u.status || "active"
      };
    }
  });

  if(!found){
    alert("Invalid ID or PIN");
    return;
  }

  if(found.status !== "active"){
    alert("Account inactive");
    return;
  }

  // save session
  localStorage.setItem("user", JSON.stringify(found));

  console.log("✅ Logged in:", found);

  // 🚀 ROLE ROUTING
  switch(found.role){

    case "admin":
      location.href = "admin-dashboard.html";
      break;

    case "teacher":
      location.href = "teacher-dashboard.html";
      break;

    case "student":
      location.href = "student-dashboard.html";
      break;

    case "janitor":
      location.href = "janitor-dashboard.html";
      break;

    case "security":
      location.href = "security-dashboard.html";
      break;

    case "coordinator":
      location.href = "coordinator-dashboard.html";
      break;

    default:
      alert("Unknown role");
  }
};

</script>

</body>
</html>
