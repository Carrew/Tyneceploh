<!DOCTYPE html>
<html>
<body>

<h2>TEF Login</h2>

<input id="userId" placeholder="User ID (TEF0001 / TCH001 / JAN001)">
<input id="pin" type="password" placeholder="PIN">

<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

function setMsg(text, error=false){
  const el = document.getElementById("msg");
  el.textContent = text;
  el.style.color = error ? "red" : "green";
}

//
// 🚀 LOGIN LOGIC
//
window.login = async function(){

  const userId = document.getElementById("userId").value.trim();
  const pin = document.getElementById("pin").value.trim();

  if(!userId || !pin){
    setMsg("Fill all fields", true);
    return;
  }

  setMsg("Checking...");

  const snap = await getDocs(collection(db,"users"));

  let found = null;

  snap.forEach(d=>{
    const u = d.data();

    if(
      (u.userId || "").trim() === userId &&
      (u.pin || "").trim() === pin
    ){
      found = u;
    }
  });

  if(!found){
    setMsg("Invalid login", true);
    return;
  }

  if(found.status && found.status !== "active"){
    setMsg("Account inactive", true);
    return;
  }

  // store session
  localStorage.setItem("user", JSON.stringify(found));

  setMsg("Login successful");

  //
  // 🎯 ROLE ROUTING
  //
  setTimeout(()=>{

    switch(found.role){

      case "student":
        location.href = "student-dashboard.html";
        break;

      case "teacher":
        location.href = "teacher-dashboard.html";
        break;

      case "admin":
        location.href = "admin-dashboard.html";
        break;

      case "janitor":
        location.href = "janitor-dashboard.html";
        break;

      case "security":
        location.href = "security-dashboard.html";
        break;

      case "coordinator":
        location.href = "coordinator-dashboard.html";
        break;

      default:
        setMsg("Unknown role", true);
    }

  },800);
};

</script>

</body>
</html>
