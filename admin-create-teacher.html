<!DOCTYPE html>
<html>
<head>
  <title>Teacher Management - TEF</title>
</head>

<body>

<h2>Teacher Management (CRUD)</h2>

<input id="name" placeholder="Teacher Name">
<input id="classes" placeholder="Classes (e.g. JSS1, JSS2)">

<select id="status">
  <option value="active">Active</option>
  <option value="inactive">Inactive</option>
</select>

<input type="hidden" id="editId">

<button onclick="saveTeacher()">Save Teacher</button>

<hr>

<input id="search" placeholder="Search teacher..." oninput="renderTeachers()">

<hr>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🆔 ID GENERATOR
function generateTeacherId(count) {
  return `TCH${String(count + 1).padStart(3, "0")}`;
}

// 🔑 PIN GENERATOR
function generatePin() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

let teachersCache = [];

// 📥 LOAD TEACHERS
async function loadTeachers() {
  const snap = await getDocs(collection(db, "users"));
  teachersCache = [];

  snap.forEach(d => {
    const data = d.data();
    if (data.role === "teacher") {
      teachersCache.push({
        ...data,
        userId: data.userId,
        docId: d.id
      });
    }
  });

  renderTeachers();
}

// 🎨 RENDER
window.renderTeachers = function () {
  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");

  let filtered = teachersCache.filter(t =>
    t.name.toLowerCase().includes(search) ||
    (t.userId || "").toLowerCase().includes(search)
  );

  list.innerHTML = filtered.map(t => `
    <div style="border:1px solid #ccc; margin:10px; padding:10px; border-radius: 8px;">
      <b>ID: ${t.userId}</b> - ${t.name} <br>
      Classes: <span style="color: green;">${(t.classes || []).join(", ")}</span> <br>
      Status: <b>${t.status}</b>

      <br><br>

      <button onclick="editTeacher('${t.docId}', '${t.name}', '${(t.classes || []).join(", ")}', '${t.status}')">Edit</button>
      <button onclick="deleteTeacher('${t.docId}')">Delete</button>
    </div>
  `).join("");
};

// 💾 SAVE (CREATE / UPDATE)
window.saveTeacher = async function () {
  const name = document.getElementById("name").value;
  const classesInput = document.getElementById("classes").value;
  const status = document.getElementById("status").value;
  const editId = document.getElementById("editId").value;

  if (!name || !classesInput) {
    alert("Fill all fields");
    return;
  }

  // Convert comma-string to clean Array
  const classesArray = classesInput.split(",").map(c => c.trim()).filter(c => c !== "");

  if (!editId) {
    // CREATE
    const snap = await getDocs(collection(db, "users"));
    const count = snap.docs.filter(d => d.data().role === "teacher").length;

    const userId = generateTeacherId(count);
    const pin = generatePin();

    await addDoc(collection(db, "users"), {
      userId: userId,
      pin: pin,           // MATCHES LOGIN: Plaintext
      name: name,
      classes: classesArray,
      status: status,     // lowercase "active" or "inactive"
      role: "teacher",
      createdAt: Date.now()
    });

    alert(`Teacher created!\nID: ${userId}\nPIN: ${pin}`);
  } else {
    // UPDATE
    const ref = doc(db, "users", editId);
    await updateDoc(ref, {
      name: name,
      classes: classesArray,
      status: status
    });
    document.getElementById("editId").value = "";
  }

  document.getElementById("name").value = "";
  document.getElementById("classes").value = "";
  loadTeachers();
};

window.editTeacher = function (id, name, classes, status) {
  document.getElementById("editId").value = id;
  document.getElementById("name").value = name;
  document.getElementById("classes").value = classes;
  document.getElementById("status").value = status;
};

window.deleteTeacher = async function (id) {
  if(confirm("Delete this teacher record?")) {
    await deleteDoc(doc(db, "users", id));
    loadTeachers();
  }
};

loadTeachers();

</script>
</body>
</html>
