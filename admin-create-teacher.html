<!DOCTYPE html>
<html>
<head>
  <title>Teacher Management - TEF</title>
</head>

<body>

<h2>Teacher Management (CRUD)</h2>

<!-- CREATE / EDIT FORM -->
<input id="name" placeholder="Teacher Name">
<input id="classes" placeholder="Classes (e.g. JSS1, JSS2)">

<select id="status">
  <option value="Active">Active</option>
  <option value="Inactive">Inactive</option>
</select>

<input type="hidden" id="editId">

<button onclick="saveTeacher()">Save Teacher</button>

<hr>

<!-- SEARCH -->
<input id="search" placeholder="Search teacher..." oninput="renderTeachers()">

<hr>

<!-- LIST -->
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// 🔐 SHA
//
async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

//
// 🆔 ID GENERATOR
//
function generateTeacherId(count) {
  return `TCH${String(count + 1).padStart(3, "0")}`;
}

//
// 🔑 PIN
//
function generatePin() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

let teachersCache = [];

//
// 📥 LOAD TEACHERS
//
async function loadTeachers() {
  const snap = await getDocs(collection(db, "users"));

  teachersCache = [];

  snap.forEach(d => {
    const data = d.data();
    if (data.role === "teacher") {
      teachersCache.push({ ...data, docId: d.id });
    }
  });

  renderTeachers();
}

//
// 🎨 RENDER
//
window.renderTeachers = function () {

  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");

  let filtered = teachersCache.filter(t =>
    t.name.toLowerCase().includes(search) ||
    t.id.toLowerCase().includes(search)
  );

  list.innerHTML = filtered.map(t => `
    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
      <b>${t.id}</b> - ${t.name} <br>
      Classes: ${(t.classes || []).join(", ")} <br>
      Status: ${t.status}

      <br><br>

      <button onclick="editTeacher('${t.docId}', '${t.name}', '${(t.classes || []).join(", ")}', '${t.status}')">Edit</button>
      <button onclick="deleteTeacher('${t.docId}')">Delete</button>
    </div>
  `).join("");

};

//
// 💾 CREATE / UPDATE
//
window.saveTeacher = async function () {

  const name = document.getElementById("name").value;
  const classesInput = document.getElementById("classes").value;
  const status = document.getElementById("status").value;
  const editId = document.getElementById("editId").value;

  if (!name || !classesInput) {
    alert("Fill all fields");
    return;
  }

  const classesArray = classesInput.split(",").map(c => c.trim());

  // CREATE
  if (!editId) {

    const snap = await getDocs(collection(db, "users"));
    const count = snap.docs.filter(d => d.data().role === "teacher").length;

    const id = generateTeacherId(count);
    const pin = generatePin();
    const pinHash = await sha256(pin);

    await addDoc(collection(db, "users"), {
      id,
      name,
      classes: classesArray,
      status,
      role: "teacher",
      pinHash,
      createdAt: Date.now()
    });

    alert(`Teacher created\nID: ${id}\nPIN: ${pin}`);
  }

  // UPDATE
  else {
    const ref = doc(db, "users", editId);

    await updateDoc(ref, {
      name,
      classes: classesArray,
      status
    });

    document.getElementById("editId").value = "";
  }

  document.getElementById("name").value = "";
  document.getElementById("classes").value = "";

  loadTeachers();
};

//
// ✏️ EDIT
//
window.editTeacher = function (id, name, classes, status) {
  document.getElementById("editId").value = id;
  document.getElementById("name").value = name;
  document.getElementById("classes").value = classes;
  document.getElementById("status").value = status;
};

//
// ❌ DELETE
//
window.deleteTeacher = async function (id) {
  await deleteDoc(doc(db, "users", id));
  loadTeachers();
};

//
// INIT
//
loadTeachers();

</script>

</body>
</html>
