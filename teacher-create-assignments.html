<!DOCTYPE html>
<html>
<body>

<h2>Create Assignment</h2>

<select id="class"></select>
<input id="subject" placeholder="Subject">
<input id="title" placeholder="Title">

<div id="questions"></div>

<button onclick="addQ()">+ Add Question</button>
<br><br>

<button onclick="create()">Create Assignment</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "teacher") location.href="login.html";

document.getElementById("class").innerHTML =
  (user.classes || []).map(c=>`<option>${c}</option>`).join("");

let count = 0;

window.addQ = function(){
  count++;

  document.getElementById("questions").innerHTML += `
    <div style="margin:5px 0;">
      Q${count}:
      <input id="q${count}" placeholder="Question">
      Score:
      <input id="s${count}" type="number" style="width:60px">
    </div>
  `;
};

window.create = async function(){

  const questions = [];
  let total = 0;

  for(let i=1;i<=count;i++){
    const q = document.getElementById(`q${i}`).value;
    const s = Number(document.getElementById(`s${i}`).value);

    if(!q || !s) continue;

    questions.push({ q, score:s });
    total += s;
  }

  await addDoc(collection(db,"assignments"),{
    teacherId:user.id,
    class:document.getElementById("class").value,
    subject:document.getElementById("subject").value,
    title:document.getElementById("title").value,

    questions,
    totalScore: total,

    createdAt: Date.now()
  });

  alert("Assignment created");
};

</script>

</body>
</html>
