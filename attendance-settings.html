<!DOCTYPE html>
<html>
<head>
  <title>Attendance Settings</title>

  <style>
    body{
      font-family:sans-serif;
      padding:20px;
      background:#f4f4f4;
    }

    .card{
      background:white;
      padding:20px;
      margin-bottom:20px;
      border-radius:10px;
    }

    input{
      padding:10px;
      width:100%;
      margin-top:10px;
    }

    button{
      margin-top:10px;
      padding:10px 20px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>Attendance Time Settings</h2>

<div id="settings"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const user =
  JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "admin"){
  location.href = "login.html";
}

const roles = [
  "teacher",
  "janitor",
  "security",
  "coordinator"
];

async function load(){

  const container =
    document.getElementById("settings");

  container.innerHTML = "";

  for(const role of roles){

    const ref =
      doc(db,"attendanceSettings",role);

    const snap =
      await getDoc(ref);

    const data =
      snap.exists()
      ? snap.data()
      : {};

    container.innerHTML += `

      <div class="card">

        <h3>${role.toUpperCase()}</h3>

        Clock In Time

        <input
          type="time"
          id="in-${role}"
          value="${data.clockInTime || ""}"
        >

        Clock Out Time

        <input
          type="time"
          id="out-${role}"
          value="${data.clockOutTime || ""}"
        >

        <button onclick="saveRole('${role}')">
          Save
        </button>

      </div>
    `;
  }
}

window.saveRole = async function(role){

  const clockInTime =
    document
      .getElementById(`in-${role}`)
      .value;

  const clockOutTime =
    document
      .getElementById(`out-${role}`)
      .value;

  if(!clockInTime || !clockOutTime){

    alert("Fill all fields");

    return;
  }

  try{

    await setDoc(
      doc(db,"attendanceSettings",role),
      {
        role,
        clockInTime,
        clockOutTime,
        updatedAt:Date.now(),
        updatedBy:user.name
      }
    );

    alert("Saved");

  }catch(err){

    console.error(err);

    alert("Failed");
  }
};

load();

</script>

</body>
</html>
