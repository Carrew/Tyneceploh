<!DOCTYPE html>
<html>
<body>

<h2>My Assignments</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "student") location.href="login.html";

let submittedMap = {};
let submissionsMap = {};

//
// 📥 LOAD EVERYTHING
//
async function load(){

  const aSnap = await getDocs(collection(db,"assignments"));
  const sSnap = await getDocs(collection(db,"submissions"));

  submittedMap = {};
  submissionsMap = {};

  // store submissions
  sSnap.forEach(d=>{
    const s = d.data();

    if(s.studentId === user.userId){
      submittedMap[s.assignmentId] = true;
      submissionsMap[s.assignmentId] = s;
    }
  });

  let html = "";

  aSnap.forEach(d=>{
    const a = d.data();

    if(a.class !== user.class) return;

    const qs = Array.isArray(a.questions) ? a.questions : [];

    const submission = submissionsMap[d.id];
    const isSubmitted = !!submission;
    const isMarked = submission?.status === "marked";

    html += `
      <div style="border:1px solid #ccc;padding:10px;margin:10px;">
        <h3>${a.title}</h3>

        ${qs.map((q,i)=>{

          const studentAns = submission?.answers?.[i] || "-";

          return `
            <div style="margin-bottom:8px;">
              <b>${q.q}</b><br>

              Your Answer: ${studentAns}<br>
              Max Score: ${q.score}<br>

              ${renderStatus(submission, i)}
            </div>
          `;
        }).join("")}

        <hr>

        ${
          !isSubmitted
          ? `<button onclick="submit('${d.id}',${qs.length})">Submit</button>`
          : isMarked
            ? `<b style="color:green">Marked - Score: ${submission.score}</b>`
            : `<b>Submitted - Awaiting marking</b>`
        }

      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "No assignments";
}

//
// 🎯 SHOW PASS / FAIL / PARTIAL RESULT
//
function renderStatus(submission, i){

  if(!submission) return "";

  if(submission.status !== "marked"){
    return `<i>Pending review</i>`;
  }

  // optional future per-question breakdown (safe fallback)
  return `<i style="color:green">Marked</i>`;
}

//
// 🚀 SUBMIT
//
window.submit = async function(id,len){

  if(submittedMap[id]){
    alert("Already submitted");
    return;
  }

  const answers = [];

  for(let i=0;i<len;i++){
    const v = document.getElementById(`${id}_${i}`)?.value;

    if(!v){
      alert("Fill all answers");
      return;
    }

    answers.push(v.trim());
  }

  await addDoc(collection(db,"submissions"),{
    assignmentId:id,
    studentId:user.userId,,
    studentName:user.name,
    answers,
    score:null,
    status:"submitted",
    createdAt:Date.now()
  });

  submittedMap[id] = true;

  alert("Submitted");
  load();
};

load();

</script>

</body>
</html>
