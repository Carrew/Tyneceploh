<!DOCTYPE html>
<html>
<body>

<h2>My Assignments</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "student") location.href="login.html";

let submitted = {};

async function load(){

  const aSnap = await getDocs(collection(db,"assignments"));
  const sSnap = await getDocs(collection(db,"submissions"));

  sSnap.forEach(d=>{
    const s = d.data();
    if(s.studentId === user.id){
      submitted[s.assignmentId] = true;
    }
  });

  let html = "";

  aSnap.forEach(d=>{
    const a = d.data();

    if(a.class !== user.class) return;

    const qs = Array.isArray(a.questions) ? a.questions : [];

    const done = submitted[d.id];

    html += `
      <div style="border:1px solid #ccc;padding:10px;margin:10px;">
        <h3>${a.title}</h3>

        ${qs.map((q,i)=>`
          <p>${q.q}</p>
          ${done ? "Submitted" : `<input id="${d.id}_${i}">`}
        `).join("")}

        ${done
          ? `<button disabled>Done</button>`
          : `<button onclick="submit('${d.id}',${qs.length})">Submit</button>`
        }
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

window.submit = async function(id,len){

  if(submitted[id]) return alert("Already submitted");

  const answers = [];

  for(let i=0;i<len;i++){
    const v = document.getElementById(`${id}_${i}`).value;
    if(!v) return alert("Fill all answers");
    answers.push(v);
  }

  await addDoc(collection(db,"submissions"),{
    assignmentId:id,
    studentId:user.id,
    studentName:user.name,
    answers,
    score:null,
    status:"submitted",
    createdAt:Date.now()
  });

  submitted[id] = true;

  alert("Submitted");

  load();
};

load();

</script>

</body>
</html>
