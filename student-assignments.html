<!DOCTYPE html>
<html>
<body>

<h2>My Assignments</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});
const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "student") {
  location.href = "login.html";
}

let submittedMap = {}; // track submissions

//
// 📥 LOAD ASSIGNMENTS + SUBMISSIONS
//
async function load(){

  console.log("🔐 User:", user);

  const assignSnap = await getDocs(collection(db,"assignments"));
  const subSnap = await getDocs(collection(db,"submissions"));

  // build submission map (prevent duplicates)
  subSnap.forEach(d=>{
    const s = d.data();
    if (s.studentId === user.id) {
      submittedMap[s.assignmentId] = true;
    }
  });

  let html = "";

  assignSnap.forEach(d => {

    const a = d.data();

    console.log("📦 Assignment:", a);

    // safe class check
    const aClass = a.class?.trim().toLowerCase();
    const uClass = user.class?.trim().toLowerCase();

    if (aClass !== uClass) return;

    // safe questions array
    const questions = Array.isArray(a.questions) ? a.questions : [];

    if (questions.length === 0) {
      console.warn("⚠️ No questions found for assignment:", d.id);
      return;
    }

    const alreadySubmitted = submittedMap[d.id];

    html += `
      <div style="border:1px solid #ccc; margin:10px; padding:10px;">
        <h3>${a.title || "Untitled Assignment"}</h3>

        ${questions.map((q,i)=>`
          <p>${q.q || "No question text"}</p>
          ${alreadySubmitted ? 
            `<i>Submitted</i>` :
            `<input id="${d.id}_${i}" placeholder="Your answer">`
          }
        `).join("")}

        <br>

        ${
          alreadySubmitted
          ? `<button disabled>Already Submitted</button>`
          : `<button onclick="submit('${d.id}', ${questions.length})">Submit</button>`
        }
      </div>
    `;
  });

  document.getElementById("list").innerHTML =
    html || "<p>No assignments available.</p>";
}

//
// 🚀 SUBMIT
//
window.submit = async function(id, len){

  if (submittedMap[id]) {
    alert("Already submitted");
    return;
  }

  const answers = [];

  for(let i=0;i<len;i++){
    const el = document.getElementById(`${id}_${i}`);
    const val = el?.value?.trim();

    if (!val) {
      alert("Answer all questions");
      return;
    }

    answers.push(val);
  }

  await addDoc(collection(db,"submissions"),{
    assignmentId:id,
    studentId:user.id,
    studentName:user.name,
    answers,
    score:null,
    status:"submitted",
    createdAt:Date.now()
  });

  alert("Submitted successfully");

  // update local state to prevent resubmit instantly
  submittedMap[id] = true;

  load();
};

//
// INIT
//
load();

</script>

</body>
</html>
