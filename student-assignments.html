<!DOCTYPE html>
<html>
<body>

<h2>My Assignments</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});
const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "student") location.href="login.html";

async function load(){
  const snap = await getDocs(collection(db,"assignments"));
  let html="";

  snap.forEach(d=>{
    const a = d.data();

    if(a.class === user.class){

      html += `<div>
        <h3>${a.title}</h3>
        ${a.questions.map((q,i)=>`
          <p>${q.q}</p>
          <input id="${d.id}_${i}">
        `).join("")}

        <button onclick="submit('${d.id}',${a.questions.length})">Submit</button>
      </div>`;
    }
  });

  document.getElementById("list").innerHTML = html;
}

window.submit = async function(id,len){

  const answers = [];

  for(let i=0;i<len;i++){
    answers.push(document.getElementById(`${id}_${i}`).value);
  }

  await addDoc(collection(db,"submissions"),{
    assignmentId:id,
    studentId:user.id,
    studentName:user.name,
    answers,
    score:null,
    status:"submitted",
    createdAt:Date.now()
  });

  alert("Submitted");
};

load();
</script>

</body>
</html>
