<!DOCTYPE html>
<html>
<head>
  <title>Setup - TEF</title>
</head>
<body>

<h2>Initialize Master Admin</h2>
<p>This page only works when no administrators exist in the system.</p>

<input id="name" placeholder="Full Name">
<input id="pin" placeholder="PIN (optional)">
<button onclick="create()">Initialize System</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh"
});
const db = getFirestore(app);

window.create = async function(){
  const name = document.getElementById("name").value.trim();
  if(!name) return alert("Name is required");

  // Check if ANY admin already exists
  const q = query(collection(db, "users"), where("role", "==", "admin"));
  const snap = await getDocs(q);

  if(!snap.empty){
    alert("Security Block: An administrator already exists. Please login and use the 'Add Admin' page instead.");
    return;
  }

  const id = "ADM001";
  const pin = document.getElementById("pin").value || Math.floor(1000 + Math.random()*9000).toString();

  await addDoc(collection(db, "users"), {
    userId: id,
    name: name,
    pin: pin,
    role: "admin",
    status: "active",
    createdAt: Date.now()
  });

  alert(`System Initialized!\nID: ${id}\nPIN: ${pin}\n\nSAVE THESE CREDENTIALS!`);
};
</script>
</body>
</html>
