<!DOCTYPE html>
<html>
<body>

<h2>Quiz Review Dashboard</h2>

<select id="quizSelect"></select>

<div id="summary"></div>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if(!user || user.role !== "teacher") location.href="login.html";

let quizzes = [];
let submissions = [];

//
// 📥 LOAD DATA
//
async function load(){

  const qSnap = await getDocs(collection(db,"quizzes"));
  const sSnap = await getDocs(collection(db,"quizSubmissions"));

  quizzes = [];
  submissions = [];

  qSnap.forEach(d=>{
    const q = d.data();
    if(q.teacherId === user.id){
      quizzes.push({id:d.id, ...q});
    }
  });

  sSnap.forEach(d=>{
    submissions.push({id:d.id, ...d.data()});
  });

  document.getElementById("quizSelect").innerHTML =
    quizzes.map(q=>`<option value="${q.id}">${q.title}</option>`).join("");

  render();
}

//
// 📊 RENDER DASHBOARD
//
function render(){

  const id = document.getElementById("quizSelect").value;

  const quiz = quizzes.find(q=>q.id === id);
  const results = submissions.filter(s=>s.quizId === id);

  if(!quiz){
    document.getElementById("list").innerHTML = "No quiz selected";
    return;
  }

  let totalStudents = results.length;

  let avg = 0;

  results.forEach(r=>{
    avg += (r.score / r.total) * 100;
  });

  avg = totalStudents ? (avg / totalStudents).toFixed(1) : 0;

  let html = `
    <h3>${quiz.title}</h3>
    <p>Total Students: ${totalStudents}</p>
    <p>Class Average: ${avg}%</p>

    <table border="1" cellpadding="8">
      <tr>
        <th>Student</th>
        <th>Score</th>
        <th>Total</th>
        <th>%</th>
      </tr>
  `;

  results.forEach(r=>{

    const percent = ((r.score / r.total) * 100).toFixed(1);

    html += `
      <tr>
        <td>${r.studentName}</td>
        <td>${r.score}</td>
        <td>${r.total}</td>
        <td>${percent}%</td>
      </tr>
    `;
  });

  html += `</table><br><h3>Detailed View</h3>`;

  results.forEach(r=>{

    html += `
      <div style="border:1px solid #ccc;margin:10px;padding:10px;">
        <b>${r.studentName}</b><br>
        Score: ${r.score}/${r.total}<br>

        <ul>
          ${r.answers.map((a,i)=>`
            <li>Q${i+1}: ${a}</li>
          `).join("")}
        </ul>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

document.getElementById("quizSelect").addEventListener("change",render);

load();

</script>

</body>
</html>
