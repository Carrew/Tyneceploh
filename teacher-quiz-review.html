<!DOCTYPE html>
<html>
<head>
  <title>Quiz Review - TEF</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background-color: #f2f2f2; }
    .student-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin: 15px 0; background: #fff; }
    .score-high { color: green; font-weight: bold; }
    .score-low { color: red; font-weight: bold; }
  </style>
</head>
<body>

<h2>Quiz Review Dashboard</h2>

<label>Select Quiz:</label>
<select id="quizSelect"></select>

<hr>

<div id="summary"></div>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh"
});

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if(!user || user.role !== "teacher") location.href = "login.html";

let quizzes = [];
let submissions = [];

async function load() {
  const qSnap = await getDocs(collection(db, "quizzes"));
  const sSnap = await getDocs(collection(db, "quizSubmissions"));

  quizzes = [];
  submissions = [];

  qSnap.forEach(d => {
    const q = d.data();
    // Use user.id (which contains the userId) to filter
    if(q.teacherId === user.id) {
      quizzes.push({ id: d.id, ...q });
    }
  });

  sSnap.forEach(d => {
    submissions.push({ id: d.id, ...d.data() });
  });

  const select = document.getElementById("quizSelect");
  select.innerHTML = quizzes.map(q => `<option value="${q.id}">${q.title}</option>`).join("");

  // Initial render after data is fetched
  if (quizzes.length > 0) render();
  else document.getElementById("list").innerHTML = "No quizzes found for your account.";
}

function render() {
  const quizId = document.getElementById("quizSelect").value;
  const quiz = quizzes.find(q => q.id === quizId);
  const results = submissions.filter(s => s.quizId === quizId);

  if(!quiz) {
    document.getElementById("list").innerHTML = "Select a quiz to view results.";
    return;
  }

  let totalStudents = results.length;
  let totalClassPoints = 0;

  results.forEach(r => {
    const total = r.total || 1; // Prevent division by zero
    totalClassPoints += (r.score / total) * 100;
  });

  const classAvg = totalStudents ? (totalClassPoints / totalStudents).toFixed(1) : 0;

  let html = `
    <div style="background:#eef; padding:15px; border-radius:5px;">
        <h3>Analytics: ${quiz.title}</h3>
        <p><b>Total Submissions:</b> ${totalStudents}</p>
        <p><b>Class Average:</b> ${classAvg}%</p>
    </div>

    <table border="1" cellpadding="10">
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Score</th>
          <th>Total Available</th>
          <th>Percentage</th>
        </tr>
      </thead>
      <tbody>
  `;

  results.forEach(r => {
    const total = r.total || 1;
    const percent = ((r.score / total) * 100).toFixed(1);
    const scoreClass = percent >= 50 ? "score-high" : "score-low";

    html += `
      <tr>
        <td>${r.studentName}</td>
        <td>${r.score}</td>
        <td>${total}</td>
        <td class="${scoreClass}">${percent}%</td>
      </tr>
    `;
  });

  html += `</tbody></table><br><h3>Detailed Student Answers</h3>`;

  results.forEach(r => {
    html += `
      <div class="student-card">
        <b>${r.studentName} (${r.studentId})</b><br>
        <span style="font-size: 0.9em; color: #555;">Submitted: ${new Date(r.createdAt).toLocaleString()}</span>
        <hr>
        <ul style="list-style-type: none; padding-left: 0;">
          ${(r.answers || []).map((a, i) => `
            <li style="margin-bottom:5px;">
                <b>Q${i+1}:</b> Selected [${a}]
            </li>
          `).join("")}
        </ul>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

document.getElementById("quizSelect").addEventListener("change", render);

load();
</script>

</body>
</html>
