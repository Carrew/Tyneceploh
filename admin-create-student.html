<!DOCTYPE html>
<html>
<head>
  <title>Student Management - TEF</title>
</head>

<body>

<h2>Student Management (CRUD)</h2>

<input id="name" placeholder="Student Name">
<input id="class" placeholder="Class">

<select id="status">
  <option value="active">Active</option>
  <option value="inactive">Inactive</option>
</select>

<input type="hidden" id="editId">

<button onclick="saveStudent()">Save Student</button>

<hr>

<input id="search" placeholder="Search student..." oninput="renderStudents()">

<hr>

<div id="list"></div>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain: "tyneceploh.firebaseapp.com",
  projectId: "tyneceploh",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🆔 ID GENERATOR
function generateId(count) {
  return `TEF${String(count + 1).padStart(4, "0")}`;
}

// 🔑 PIN GENERATOR
function generatePin() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

let studentsCache = [];

// 📥 LOAD STUDENTS
async function loadStudents() {
  const snap = await getDocs(collection(db, "users"));
  studentsCache = [];

  snap.forEach(d => {
    const data = d.data();
    if (data.role === "student") {
      studentsCache.push({
        ...data,
        userId: data.userId, 
        docId: d.id // The Firebase internal ID
      });
    }
  });
  renderStudents();
}

// 🎨 RENDER
window.renderStudents = function () {
  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");

  let filtered = studentsCache.filter(s =>
    s.name.toLowerCase().includes(search) ||
    (s.userId || "").toLowerCase().includes(search)
  );

  list.innerHTML = filtered.map(s => `
    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
      <b>ID: ${s.userId}</b> - ${s.name} <br>
      Class: ${s.class} <br>
      Status: ${s.status}
      <br><br>
      <button onclick="editStudent('${s.docId}', '${s.name}', '${s.class}', '${s.status}')">Edit</button>
      <button onclick="deleteStudent('${s.docId}')">Delete</button>
    </div>
  `).join("");
};

// 💾 SAVE (CREATE / UPDATE)
window.saveStudent = async function () {
  const name = document.getElementById("name").value;
  const className = document.getElementById("class").value;
  const status = document.getElementById("status").value;
  const editId = document.getElementById("editId").value;

  if (!name || !className) {
    alert("Fill all fields");
    return;
  }

  if (!editId) {
    // CREATE NEW STUDENT
    const snap = await getDocs(collection(db, "users"));
    // Count all users to generate next ID
    const count = snap.docs.length; 

    const userId = generateId(count);
    const pin = generatePin();

    await addDoc(collection(db, "users"), {
      userId: userId,
      pin: pin, // MATCHES LOGIN: Saving as 'pin' instead of 'pinHash'
      name: name,
      class: className,
      status: status,
      role: "student",
      createdAt: Date.now()
    });

    alert(`Student Created!\nID: ${userId}\nPIN: ${pin}`);
  } else {
    // UPDATE EXISTING
    const ref = doc(db, "users", editId);
    await updateDoc(ref, {
      name: name,
      class: className,
      status: status
    });
    document.getElementById("editId").value = "";
  }

  document.getElementById("name").value = "";
  document.getElementById("class").value = "";
  loadStudents();
};

window.editStudent = function (id, name, className, status) {
  document.getElementById("editId").value = id;
  document.getElementById("name").value = name;
  document.getElementById("class").value = className;
  document.getElementById("status").value = status;
};

window.deleteStudent = async function (id) {
  if(confirm("Delete this student?")) {
    await deleteDoc(doc(db, "users", id));
    loadStudents();
  }
};

loadStudents();
</script>
</body>
</html>
