<!DOCTYPE html>
<html>
<body>

<h2>Student Dashboard</h2>

<div id="info"></div>

<hr>

<h3>My Portal</h3>

<button onclick="go('student-assignments.html')">Assignments</button>
<button onclick="go('student-quiz.html')">Quizzes</button>
<button onclick="go('student-results.html')">Results</button>
<button onclick="go('student-notes.html')">Lessons</button>

<br><br>
<button onclick="logout()">Logout</button>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "student"){
  location.href = "login.html";
}

document.getElementById("info").innerHTML = `
  <b>${user.name}</b><br>
  ID: ${user.userId}<br>
  Class: ${user.class}<br>
`;

function go(page){
  location.href = page;
}

function logout(){
  localStorage.removeItem("user");
  location.href = "login.html";
}

</script>

</body>
</html>
