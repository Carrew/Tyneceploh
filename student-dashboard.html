<!DOCTYPE html>
<html>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user || user.role !== "student"){
  location.href = "login.html";
}
</script>

<h2>Student Dashboard</h2>
<p>Welcome, <b id="name"></b></p>

<div>
  <h3>My Learning</h3>
  <button onclick="go('student-notes.html')">Notes</button>
  <button onclick="go('student-assignment.html')">Assignments</button>
  <button onclick="go('student-quiz.html')">Quizzes</button>
</div>

<div>
  <h3>Results</h3>
  <button onclick="go('student-results.html')">View Results</button>
</div>

<br>
<button onclick="logout()">Logout</button>

<script>
document.getElementById("name").innerText = user.name;

function go(p){ location.href = p; }

function logout(){
  localStorage.removeItem("user");
  location.href = "login.html";
}
</script>

</body>
</html>
