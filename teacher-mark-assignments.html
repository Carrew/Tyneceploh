<!DOCTYPE html>
<html>
<body>

<h2>Mark Assignments</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "teacher") location.href="login.html";

async function load(){

  const sSnap = await getDocs(collection(db,"submissions"));
  const aSnap = await getDocs(collection(db,"assignments"));

  const assignments = {};
  aSnap.forEach(d=>{
    assignments[d.id] = d.data();
  });

  let html = "";

  sSnap.forEach(d=>{
    const s = d.data();
    const a = assignments[s.assignmentId];

    if(!a) return;

    const qs = a.questions || [];

    html += `
      <div style="border:1px solid #ccc;padding:10px;margin:10px;">
        <h3>${s.studentName}</h3>

        ${qs.map((q,i)=>`
          <div>
            <b>${q.q}</b><br>

            Student: ${s.answers[i] || "-"}<br>

            <label>
              <input type="checkbox" id="p_${d.id}_${i}">
              Pass
            </label>

            Bonus:
            <input type="number" id="b_${d.id}_${i}" style="width:60px" value="0">
          </div>
          <hr>
        `).join("")}

        <button onclick="mark('${d.id}','${s.assignmentId}',${qs.length})">
          Submit Mark
        </button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

window.mark = async function(subId,assignId,len){

  const aSnap = await getDocs(collection(db,"assignments"));
  let assign = null;

  aSnap.forEach(d=>{
    if(d.id === assignId) assign = d.data();
  });

  const qs = assign.questions;

  let total = 0;

  for(let i=0;i<len;i++){

    const pass = document.getElementById(`p_${subId}_${i}`).checked;
    const bonus = Number(document.getElementById(`b_${subId}_${i}`).value || 0);

    const base = qs[i].score;

    if(pass){
      total += base + bonus;
    }
  }

  await updateDoc(doc(db,"submissions",subId),{
    score: total,
    status: "marked",
    markedAt: Date.now()
  });

  alert("Marked");
  load();
};

load();

</script>

</body>
</html>
