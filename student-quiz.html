<!DOCTYPE html>
<html>
<body>

<h2>My Quizzes</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDjswYVR2ijJLil3hnHlzBq9NLMW5VHVg4",
  authDomain:"tyneceploh.firebaseapp.com",
  projectId:"tyneceploh"
});

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
if(!user || user.role !== "student") location.href="login.html";

let submittedMap = {};
let quizMap = {};

//
// 📥 LOAD DATA
//
async function load(){

  console.log("📌 Student:", user);

  const qSnap = await getDocs(collection(db,"quizzes"));
  const sSnap = await getDocs(collection(db,"quizSubmissions"));

  submittedMap = {};
  quizMap = {};

  // submissions
  sSnap.forEach(d=>{
    const s = d.data();
    if(s.studentId === user.userId){
      submittedMap[s.quizId] = true;
      quizMap[s.quizId] = s;
    }
  });

  let html = "";

  qSnap.forEach(d=>{
    const q = d.data();

    if(q.class !== user.class) return;

    const qs = Array.isArray(q.questions) ? q.questions : [];

    const submission = quizMap[d.id];
    const done = !!submission;

    html += `
      <div style="border:1px solid #ccc;margin:10px;padding:10px;">
        <h3>${q.title}</h3>
        <small>Total Score: ${q.totalScore || 0}</small>
        <hr>
    `;

    qs.forEach((x,i)=>{

      html += `
        <div style="margin-bottom:10px;">
          <b>${x.q}</b><br>

          ${x.options.map((o,idx)=>`
            <label>
              <input type="radio" name="${d.id}_${i}" value="${["A","B","C","D"][idx]}"
              ${done ? "disabled" : ""}>
              ${o}
            </label><br>
          `).join("")}
        </div>
      `;
    });

    html += done
      ? `<b style="color:green">Score: ${submission.score}/${submission.total}</b>`
      : `<button onclick="submitQuiz('${d.id}',${qs.length})">Submit Quiz</button>`;

    html += `</div>`;
  });

  document.getElementById("list").innerHTML = html || "No quizzes available";
}

//
// 🚀 SUBMIT + AUTO MARK
//
window.submitQuiz = async function(id,len){

  if(submittedMap[id]){
    alert("Already submitted");
    return;
  }

  const answers = [];

  for(let i=0;i<len;i++){

    const opts = document.getElementsByName(`${id}_${i}`);

    let selected = "";

    opts.forEach(o=>{
      if(o.checked) selected = o.value;
    });

    if(!selected){
      alert("Answer all questions");
      return;
    }

    answers.push(selected);
  }

  // get quiz
  const snap = await getDocs(collection(db,"quizzes"));

  let quiz = null;

  snap.forEach(d=>{
    if(d.id === id) quiz = d.data();
  });

  let score = 0;
  let total = 0;

  quiz.questions.forEach((q,i)=>{

    total += q.score;

    if(q.answer === answers[i]){
      score += q.score;
    }
  });

  await addDoc(collection(db,"quizSubmissions"),{
    quizId:id,
    studentId:user.userId,
    studentName:user.name,
    answers,
    score,
    total,
    createdAt:Date.now()
  });

  submittedMap[id] = true;

  alert(`Score: ${score}/${total}`);

  load();
};

load();

</script>

</body>
</html>
