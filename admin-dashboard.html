<!DOCTYPE html>
<html>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user || user.role !== "admin"){
  location.href = "login.html";
}
</script>

<h2>Admin Dashboard</h2>
<p>Welcome, <b id="name"></b></p>

<div>
  <h3>User Management</h3>
  <button onclick="go('admin-create-student.html')">Students</button>
  <button onclick="go('admin-create-teacher.html')">Teachers</button>
  <button onclick="go('admin-create-admin.html')">Admins</button>
</div>

<div>
  <h3>Staff Management</h3>
  <button onclick="go('admin-create-janitor.html')">Janitors</button>
  <button onclick="go('admin-create-security.html')">Security</button>
  <button onclick="go('admin-create-coordinator.html')">Coordinators</button>
</div>

<div>
  <h3>Academic Control</h3>
  <button onclick="go('admin-grade-approval.html')">Approve Grades</button>
  <button onclick="go('admin-results.html')">Results</button>
</div>

<div>
  <h3>System</h3>
  <button onclick="go('notes.html')">Notes</button>
  <button onclick="go('assignments.html')">Assignments</button>
  <button onclick="go('quiz-review.html')">Quizzes</button>
</div>

<br>
<button onclick="logout()">Logout</button>

<script>
document.getElementById("name").innerText = user.name;

function go(page){
  location.href = page;
}

function logout(){
  localStorage.removeItem("user");
  location.href = "login.html";
}
</script>

</body>
</html>
