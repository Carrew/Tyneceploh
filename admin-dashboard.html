<!DOCTYPE html>
<html>
<body>

<h2>Admin Dashboard</h2>

<div id="info"></div>

<hr>

<h3>User Management</h3>

<button onclick="go('admin-create-student.html')">Create Student</button>
<button onclick="go('admin-create-teacher.html')">Create Teacher</button>

<button onclick="go('admin-create-janitor.html')">Create Janitor</button>
<button onclick="go('admin-create-security.html')">Create Security</button>
<button onclick="go('admin-create-coordinator.html')">Create Coordinator</button>

<br><br>

<h3>Academic Control</h3>

<button onclick="go('admin-grade-approval.html')">Approve Grades</button>

<br><br>

<button onclick="logout()">Logout</button>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "admin"){
  location.href = "login.html";
}

document.getElementById("info").innerHTML = `
  <b>${user.name}</b><br>
  ID: ${user.userId}
`;

function go(page){
  location.href = page;
}

function logout(){
  localStorage.removeItem("user");
  location.href = "login.html";
}

</script>

</body>
</html>
